<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <style>
        .home{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:80px 10%;
    background:#050924;
}

.home-content{
    max-width:500px;
}

.home-content h1{
    font-size:42px;
    color: #f5f5f5;
}

.home-content span{
    color:#4f6cff;
}

.home-content h2{
    margin:10px 0;
    color:#f5f5f5;
}

.home-content p{
    margin:20px 0;
    line-height:1.6;
    color: aliceblue;
}

.home-buttons{
    margin-top:20px;
}

.btn{
    background:#4f6cff;
    color:white;
    padding:10px 20px;
    text-decoration:none;
    border-radius:6px;
    margin-right:10px;
}

.btn2{
    border:2px solid #4f6cff;
    padding:10px 20px;
    text-decoration:none;
    border-radius:6px;
    color:#4f6cff;
}

.btn:hover{
    background:#2d44ff;
}

.btn2:hover{
    background:#4f6cff;
    color:white;
}

.home-img img{
    width:320px;
    border-radius:50%;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
    </style>
</head>
<body>
    <section class="home">
    <div class="home-content">
        <h1>Hello, I'm <span>Aashik Kr. Danuwar</span></h1>
        <h2>IT Student & Beginner Developer</h2>
        <p>
            I am passionate about web development and programming.
            I enjoy creating modern websites and solving coding problems.
        </p>

        <div class="home-buttons">
            <a href="About.html" class="btn">About Me</a>
            <a href="Contact.html" class="btn2">Contact Me</a>
        </div>
    </div>

    <div class="home-img">
        <img src="a.jpg" alt="profile">
    </div>
</section>
</body>
</html>
